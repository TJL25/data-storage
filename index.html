<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>PolyTrack 0.6.0 | Multiplayer Fix</title>
    
    <script>
      window.polytrackModConfiguration = { unblocked: true };
    </script>

    <style>
      body { margin: 0; background-color: #000; overflow: hidden; }
      #unity-container { width: 100vw; height: 100vh; }
      #unity-canvas { width: 100%; height: 100%; background: #231f20; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
    </div>

    <script src="Build/UnityLoader.js"></script>
    <script>
      // This tells the engine to look inside the Build folder for the game data
      var unityInstance = UnityLoader.instantiate("unity-canvas", "Build/PolyTrack.json");
    </script>
  </body>
</html>
